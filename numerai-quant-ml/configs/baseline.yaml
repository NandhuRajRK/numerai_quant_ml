project:
  name: numerai-quant-ml
  random_seed: 42

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  predictions_dir: data/predictions
  models_dir: models
  artifacts_dir: artifacts
  reports_dir: reports

numerai:
  # Assumption as of this scaffold: Numerai Tournament datasets are addressable as
  # "<dataset_version>/<file_name>" through numerapi.download_dataset.
  dataset_version: v5.2
  train_file: train.parquet
  validation_file: validation.parquet
  live_file: live.parquet

model:
  name: lightgbm_baseline
  target_col: target
  id_col: id
  era_col: era
  prediction_col: prediction
  params:
    objective: regression
    metric: l2
    n_estimators: 1200
    learning_rate: 0.01
    num_leaves: 31
    max_depth: -1
    subsample: 0.85
    colsample_bytree: 0.5
    min_child_samples: 100
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    n_jobs: -1

validation:
  feature_exposure_sample_size: 500
  walk_forward:
    min_train_eras: 24
    validation_eras: 4
    embargo_eras: 1
    step_size: 4
    max_folds: 6

advanced:
  artifact_name: portfolio_ensemble
  train_on:
    include_validation_for_live_model: true
  neutralization:
    enabled: true
    proportion: 0.5
    top_n_features: 50
  ensemble:
    normalize_weights: true
  model_zoo:
    - name: lgbm_main
      type: lightgbm
      weight: 0.45
      params:
        objective: regression
        metric: l2
        n_estimators: 1400
        learning_rate: 0.012
        num_leaves: 64
        subsample: 0.85
        colsample_bytree: 0.5
        min_child_samples: 120
        reg_alpha: 0.15
        reg_lambda: 1.2
        random_state: 42
        n_jobs: -1
    - name: lgbm_alt
      type: lightgbm
      weight: 0.35
      params:
        objective: regression
        metric: l2
        n_estimators: 900
        learning_rate: 0.02
        num_leaves: 31
        subsample: 0.9
        colsample_bytree: 0.35
        min_child_samples: 180
        reg_alpha: 0.05
        reg_lambda: 2.0
        random_state: 7
        n_jobs: -1
    - name: xgb_optional
      type: xgboost
      enabled: false
      weight: 0.20
      params:
        objective: reg:squarederror
        n_estimators: 700
        learning_rate: 0.03
        max_depth: 6
        subsample: 0.85
        colsample_bytree: 0.45
        reg_alpha: 0.05
        reg_lambda: 1.5
        random_state: 42
        n_jobs: -1

reporting:
  top_feature_exposure_count: 20
  save_plot_formats:
    - png

project:
  name: numerai-quant-ml
  random_seed: 42

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  predictions_dir: data/predictions
  models_dir: models
  artifacts_dir: artifacts
  reports_dir: reports

numerai:
  dataset_version: v5.2
  train_file: train.parquet
  validation_file: validation.parquet
  live_file: live.parquet

runtime:
  train_era_limit: 60

model:
  name: blended_tree_portfolio_medium_catboost_v4
  target_col: target
  id_col: id
  era_col: era
  prediction_col: prediction
  params:
    objective: regression
    metric: l2
    n_estimators: 500
    learning_rate: 0.02
    num_leaves: 31
    max_depth: -1
    subsample: 0.85
    colsample_bytree: 0.5
    min_child_samples: 100
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    n_jobs: 6

validation:
  feature_exposure_sample_size: 250
  walk_forward:
    min_train_eras: 24
    validation_eras: 4
    embargo_eras: 1
    step_size: 4
    max_folds: 3

advanced:
  artifact_name: portfolio_medium_catboost_v4_ensemble
  train_on:
    include_validation_for_live_model: false
  neutralization:
    enabled: true
    proportion: 0.5
    top_n_features: 30
  ensemble:
    normalize_weights: true
  model_zoo:
    - name: lgbm_main
      type: lightgbm
      weight: 0.30
      params:
        objective: regression
        metric: l2
        n_estimators: 700
        learning_rate: 0.02
        num_leaves: 64
        subsample: 0.85
        colsample_bytree: 0.5
        min_child_samples: 120
        reg_alpha: 0.15
        reg_lambda: 1.2
        random_state: 42
        n_jobs: 6
        force_col_wise: true
    - name: lgbm_alt
      type: lightgbm
      weight: 0.10
      params:
        objective: regression
        metric: l2
        n_estimators: 450
        learning_rate: 0.03
        num_leaves: 31
        subsample: 0.9
        colsample_bytree: 0.35
        min_child_samples: 180
        reg_alpha: 0.05
        reg_lambda: 2.0
        random_state: 7
        n_jobs: 6
        force_col_wise: true
    - name: catboost_optional
      type: catboost
      enabled: true
      weight: 0.60
      params:
        loss_function: RMSE
        iterations: 1000
        learning_rate: 0.02
        depth: 10
        l2_leaf_reg: 10.0
        bagging_temperature: 1.0
        random_strength: 2.0
        random_seed: 42
        thread_count: 6
        verbose: false

reporting:
  top_feature_exposure_count: 15
  save_plot_formats:
    - png

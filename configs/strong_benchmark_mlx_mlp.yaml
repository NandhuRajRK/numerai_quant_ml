project:
  name: numerai-quant-ml
  random_seed: 42

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  predictions_dir: data/predictions
  models_dir: models
  artifacts_dir: artifacts
  reports_dir: reports

numerai:
  dataset_version: v5.2
  train_file: train.parquet
  validation_file: validation.parquet
  live_file: live.parquet

runtime:
  train_era_limit: 180

model:
  name: strong_benchmark_mlx_mlp
  target_col: target
  id_col: id
  era_col: era
  prediction_col: prediction
  params:
    objective: regression
    metric: l2
    n_estimators: 500
    learning_rate: 0.02
    num_leaves: 31
    max_depth: -1
    subsample: 0.85
    colsample_bytree: 0.5
    min_child_samples: 100
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    n_jobs: 6

validation:
  feature_exposure_sample_size: 250
  walk_forward:
    min_train_eras: 24
    validation_eras: 4
    embargo_eras: 1
    step_size: 4
    max_folds: 15

advanced:
  artifact_name: strong_benchmark_mlx_mlp_ensemble
  train_on:
    include_validation_for_live_model: false
  neutralization:
    enabled: true
    proportion: 0.5
    top_n_features: 30
  ensemble:
    normalize_weights: true
  model_zoo:
    - name: lgbm_main
      type: lightgbm
      weight: 0.35
      params:
        objective: regression
        metric: l2
        n_estimators: 700
        learning_rate: 0.02
        num_leaves: 64
        subsample: 0.85
        colsample_bytree: 0.5
        min_child_samples: 120
        reg_alpha: 0.15
        reg_lambda: 1.2
        random_state: 42
        n_jobs: 6
        force_col_wise: true
    - name: lgbm_alt
      type: lightgbm
      weight: 0.05
      params:
        objective: regression
        metric: l2
        n_estimators: 450
        learning_rate: 0.03
        num_leaves: 31
        subsample: 0.9
        colsample_bytree: 0.35
        min_child_samples: 180
        reg_alpha: 0.05
        reg_lambda: 2.0
        random_state: 7
        n_jobs: 6
        force_col_wise: true
    - name: mlx_mlp_optional
      type: mlx_mlp
      enabled: true
      weight: 0.60
      params:
        hidden_dims:
          - 2048
          - 1024
          - 384
          - 96
        dropout: 0.15
        activation: silu
        use_layer_norm: true
        learning_rate: 0.0002
        weight_decay: 0.0005
        batch_size: 8192
        max_epochs: 60
        patience: 10
        validation_fraction: 0.15
        random_seed: 42
        input_noise_std: 0.01
        validation_metric: era_corr

reporting:
  top_feature_exposure_count: 15
  save_plot_formats:
    - png
